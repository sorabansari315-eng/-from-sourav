function smoothFlash(){

  document.body.style.background="white";

// Floating hearts
const heartShapes = ["вЭ§пЄП","рЯТЦ","рЯТШ","рЯТЭ","рЯТЧ","рЯТУ"];
function createHeart(){
  let h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = heartShapes[Math.floor(Math.random()*heartShapes.length)];
  let size = 20 + Math.random()*30;
  h.style.fontSize = size + "px";
  h.style.left = Math.random() * window.innerWidth + "px";
  h.style.top = window.innerHeight + "px";
  document.body.appendChild(h);

  let floatDuration = 5 + Math.random()*5;
  let startLeft = parseFloat(h.style.left);
  let startTime = null;
  let swayAmplitude = 20 + Math.random()*30;

  function animate(timestamp){
    if(!startTime) startTime = timestamp;
    let elapsed = (timestamp - startTime)/1000;
    let progress = elapsed/floatDuration;
    if(progress>1) progress=1;

    h.style.top = window.innerHeight - (window.innerHeight + 50)*progress + "px";
    h.style.left = startLeft + Math.sin(elapsed*2)*swayAmplitude + "px";
    h.style.opacity = 1 - progress;

    if(progress<1){
      requestAnimationFrame(animate);
    } else {
      h.remove();
    }
  }
  requestAnimationFrame(animate);
}

function startHeartsLoop(){

function typeFlirt(text, callback){

// Smooth floating options

let floatingButtons = [];

function createSingleOption(idx){
  const container=document.getElementById("optionsContainer");
  if(idx < optionTexts.length){
    let btn=document.createElement("button");
    btn.className="optionBtn";
    btn.innerText=optionTexts[idx];
    btn.onclick=()=>chooseOption(optionTexts[idx]);
    btn.style.left=Math.random()*70+"vw";
    btn.style.top=Math.random()*50+"vh";
    container.appendChild(btn);

    floatingButtons.push({
      el: btn,
      dx: (Math.random()*0.2 + 0.1) * (Math.random()<0.5?-1:1),
      dy: (Math.random()*0.2 + 0.1) * (Math.random()<0.5?-1:1)
    });

    showFlirtingLine();
  }
}

function animateFloatingButtons(){
  floatingButtons.forEach(btnData=>{
    let btn = btnData.el;
    let left = parseFloat(btn.style.left);
    let top = parseFloat(btn.style.top);
    left += btnData.dx;
    top += btnData.dy;

    if(left < 0 || left > 80) btnData.dx *= -1;
    if(top < 0 || top > 60) btnData.dy *= -1;

    btn.style.left = left + "vw";
    btn.style.top = top + "vh";
  });
  requestAnimationFrame(animateFloatingButtons);
}
